<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사이드 스토리 1 - 여관의 밤</title>
  <style>
    body {
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.8;
      color: #222;
      background: #fafafa;
    }
    .log-header { border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1.5rem; }
    .log-header h1 { font-size: 1.5rem; }
    .log-header .meta { color: #666; font-size: 0.9rem; margin-top: 0.3rem; }
    .scene { margin: 1.5rem 0; }
    .scene-title { font-weight: 700; color: #444; margin-bottom: 0.5rem; }
    .dialogue { margin: 0.5rem 0; }
    .speaker { font-weight: 700; }
    .speaker.pc { color: #2563eb; }
    .speaker.npc { color: #16a34a; }
    .speaker.gm { color: #dc2626; }
    .narration { color: #555; font-style: italic; }
  </style>
</head>
<body>
  <div class="log-header">
    <h1>사이드 스토리 1 - 여관의 밤</h1>
    <div class="meta">2026-01-18 · 참여자: 아린, 미라</div>
  </div>

  <div class="scene">
    <div class="scene-title">[장면 1] 붉은 달 여관, 심야</div>
    <p class="narration">의뢰를 받은 다음 날 밤. 아린과 미라는 여관 방에서 하루를 정리한다.</p>
    <div class="dialogue"><span class="speaker pc">미라:</span> "오늘 의뢰서에서 본 룬 문자, 자료를 좀 찾아봐야겠어."</div>
    <div class="dialogue"><span class="speaker pc">아린:</span> "나는 검을 손보고 있을게. 내일 출발 전에."</div>
    <div class="dialogue"><span class="speaker gm">GM:</span> 방문 너머로 여관의 웅성거림이 들려온다. 다른 손님들이 술을 마시는 듯하다.</div>
  </div>
</body>
</html>
