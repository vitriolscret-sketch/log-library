<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원샷 1 - 고래의 노래</title>
  <style>
    body {
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      line-height: 1.8;
      color: #222;
      background: #fafafa;
    }
    .log-header { border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 1.5rem; }
    .log-header h1 { font-size: 1.5rem; }
    .log-header .meta { color: #666; font-size: 0.9rem; margin-top: 0.3rem; }
    .scene { margin: 1.5rem 0; }
    .scene-title { font-weight: 700; color: #444; margin-bottom: 0.5rem; }
    .dialogue { margin: 0.5rem 0; }
    .speaker { font-weight: 700; }
    .speaker.pc { color: #2563eb; }
    .speaker.npc { color: #16a34a; }
    .speaker.gm { color: #dc2626; }
    .narration { color: #555; font-style: italic; }
  </style>
</head>
<body>
  <div class="log-header">
    <h1>원샷 1 - 고래의 노래</h1>
    <div class="meta">2026-02-05 · 참여자: 단발성 시나리오</div>
  </div>

  <div class="scene">
    <div class="scene-title">[장면 1] 항구 마을 '파도의 끝'</div>
    <p class="narration">해안가 마을에 이상한 소문이 퍼졌다. 밤마다 바다에서 노랫소리가 들린다고.</p>
    <div class="dialogue"><span class="speaker gm">GM:</span> 여관에서 마을 사람들의 이야기를 들을 수 있다. 최근 어획량이 줄었다는 말이 나온다.</div>
    <div class="dialogue"><span class="speaker npc">어부:</span> "이상하리만치 물고기가 안 잡혀요. 바다에 뭔가 있긴 있는 거겠죠?"</div>
  </div>
</body>
</html>
